<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Northmere Studio</title>
  <meta name="description" content="Northmere Studio designs bespoke generative systems for visual communication.">
  <style>
    :root {
      --bg: #f7f5f1;
      --bg-top: #fbfaf8;
      --panel: rgba(255, 255, 255, 0.92);
      --text: #111111;
      --muted: #5a5a5a;
      --lead: #66625d;
      --accent: #ff4040;
      --line: rgba(17, 17, 17, 0.14);
      --shadow: 0 24px 80px rgba(17, 17, 17, 0.06);
      color-scheme: light
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      font-family: "Avenir Next", Avenir, "Segoe UI", "Helvetica Neue", Arial, sans-serif
    }

    html {
      background: var(--bg)
    }

    body {
      min-height: 100dvh;
      background: radial-gradient(circle at top left, rgba(255, 64, 64, 0.085), transparent 30%), linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility
    }

    .frame {
      height: 100dvh;
      width: 100%;
      display: grid;
      place-items: center;
      padding: clamp(24px, 4vw, 48px)
    }

    .panel {
      width: min(980px, 100%);
      height: min(650px, calc(100dvh - 48px));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: clamp(28px, 5vw, 56px);
      display: grid;
      grid-template-rows: 1fr auto;
      background: var(--panel);
      box-shadow: var(--shadow);
      gap: clamp(20px, 3vw, 36px)
    }

    .hero {
      align-self: center;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: start;
      column-gap: clamp(28px, 4vw, 48px)
    }

    .brand {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding-top: clamp(6px, 0.8vw, 10px)
    }

    .brand .logo {
      display: block;
      width: clamp(190px, 25vw, 270px);
      height: auto;
      color: var(--text)
    }

    .content {
      display: grid;
      align-content: start;
      gap: 18px;
      max-width: 640px;
      padding-top: clamp(10px, 1vw, 14px)
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.3rem);
      line-height: 1.02;
      font-weight: 500;
      letter-spacing: -0.032em
    }

    .lead {
      margin: 0;
      max-width: 38rem;
      color: var(--lead);
      font-size: clamp(1rem, 1.5vw, 1.18rem);
      line-height: 1.55
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.95rem
    }

    .email {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid color-mix(in srgb, var(--text) 20%, transparent);
      padding-bottom: 2px
    }

    .email:hover,
    .email:focus-visible {
      border-bottom-color: var(--accent);
      color: var(--accent);
      outline: none
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d0f12;
        --bg-top: #171b21;
        --panel: rgba(18, 22, 28, 0.9);
        --text: #f5f7fa;
        --muted: #b7c0ca;
        --lead: #d2d7de;
        --line: rgba(255, 255, 255, 0.14);
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        color-scheme: dark
      }
    }

    @media (max-width:720px) {
      .panel {
        height: min(720px, calc(100dvh - 24px));
        border-radius: 22px
      }

      .hero {
        grid-template-columns: 1fr;
        row-gap: 20px
      }

      .brand,
      .content {
        padding-top: 0
      }

      .content {
        gap: 14px
      }

      .footer {
        justify-content: flex-start
      }
    }
  </style>
</head>
